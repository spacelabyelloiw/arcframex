name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6.2"
  GODOT_STATUS: "stable"
  EXPORT_PRESET: "Web"
  EXPORT_DIR: "build/web"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot and export templates
        shell: bash
        run: |
          set -euxo pipefail
          GODOT_TAG="${GODOT_VERSION}-${GODOT_STATUS}"
          GODOT_TEMPLATE_DIR="${GODOT_VERSION}.${GODOT_STATUS}"
          GODOT_BASE="https://github.com/godotengine/godot/releases/download/${GODOT_TAG}"
          wget -q "${GODOT_BASE}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          wget -q "${GODOT_BASE}/Godot_v${GODOT_TAG}_export_templates.tpz"
          unzip -q "Godot_v${GODOT_TAG}_linux.x86_64.zip"
          mv "Godot_v${GODOT_TAG}_linux.x86_64" godot
          chmod +x godot
          mkdir -p "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          unzip -q "Godot_v${GODOT_TAG}_export_templates.tpz"
          mv templates/* "${HOME}/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}/"

      - name: Export Web build
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${EXPORT_DIR}"
          ./godot --headless --path . --export-release "${EXPORT_PRESET}" "${EXPORT_DIR}/index.html"
          touch "${EXPORT_DIR}/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.EXPORT_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
